version: "2"

sql:
  - engine: "sqlite"
    queries: "./data/queries/sqlite"
    schema: "./data/schema/schema.sql"
    gen:
      go:
        package: "dbqueries"
        out: "./internal/storage/sqlite/dbqueries"
        overrides:
          - column: "command_params.type"
            go_type:
              type: "int16"